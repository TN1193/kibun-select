<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>条件で選ぶ | 気分転換セレクト</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <header class="site-header">
    <a class="logo" href="index.html">気分転換セレクト</a>

    <nav class="nav">
      <a href="index.html">ホーム</a>
      <a href="select.html">条件で選ぶ</a>
      <a href="category.html">ランダム</a>
      <a href="result.html">結果</a>
    </nav>
  </header>

  <main>
    <section class="section select-page">
      <div class="section-title center-title">
        <p class="eyebrow">条件で選ぶ</p>

        <h2>今の状態を選ぶ</h2>

        <p>
          気分、時間、場所、費用を選ぶ。
          
        </p>
      </div>

      <form class="selector selector-full" id="refreshForm">
        <fieldset>
          <legend>今の気分</legend>

          <label>
            <input type="radio" name="mood" value="relax" checked>
            リラックスしたい
          </label>

          <label>
            <input type="radio" name="mood" value="energy">
            元気になりたい
          </label>

          <label>
            <input type="radio" name="mood" value="focus">
            集中したい
          </label>

          <label>
            <input type="radio" name="mood" value="random">
            おまかせ
          </label>
        </fieldset>

        <fieldset>
          <legend>使える時間</legend>

          <label>
            <input type="radio" name="time" value="5" checked>
            5分
          </label>

          <label>
            <input type="radio" name="time" value="10">
            10分
          </label>

          <label>
            <input type="radio" name="time" value="30">
            30分
          </label>
        </fieldset>

        <fieldset>
          <legend>場所</legend>

          <label>
            <input type="radio" name="place" value="inside" checked>
            室内
          </label>

          <label>
            <input type="radio" name="place" value="outside">
            屋外
          </label>

          <label>
            <input type="radio" name="place" value="anywhere">
            どちらでも
          </label>
        </fieldset>

        <fieldset>
          <legend>費用</legend>

          <label>
            <input type="radio" name="cost" value="0" checked>
            0円
          </label>

          <label>
            <input type="radio" name="cost" value="500">
            500円くらい
          </label>

          <label>
            <input type="radio" name="cost" value="1000">
            1000円くらい
          </label>
        </fieldset>

        <div class="button-row center-buttons">
          <button type="submit">この条件で結果を見る</button>

          <a class="primary-button secondary-button" href="category.html">
            完全ランダムで選ぶ
          </a>
        </div>
      </form>
    </section>
  </main>

  <footer class="footer">
    <p>気分転換を選べるWebサイト</p>
  </footer>

  <script src="js/script.js"></script>
</body>
</html>
